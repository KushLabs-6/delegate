services:
  # Backend Express API Service
  - type: web
    name: delegate-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push && npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: delegate-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  # Frontend Vite Static Website Service
  - type: web
    name: delegate-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    plan: free
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: delegate-backend
          type: web
          property: host

databases:
  - name: delegate-db
    plan: free
