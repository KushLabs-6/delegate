services:
  # Unified Delegate App
  - type: web
    name: delegateapp
    env: node
    rootDir: .
    buildCommand: npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: delegate-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"

databases:
  - name: delegate-db
    plan: free
