services:
  # Unified Delegate App
  - type: web
    name: kushlabs-delegate
    env: node
    rootDir: backend
    buildCommand: |
      cd ../frontend && npm install && npm run build && cd ../backend && cp prisma/schema.production.prisma prisma/schema.prisma && npm install --include=dev && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: delegate-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

databases:
  - name: delegate-db
    plan: free
