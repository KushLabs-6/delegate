services:
  - type: web
    name: delegateapp
    env: node
    rootDir: .
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && npm install --include=dev && cp prisma/schema.production.prisma prisma/schema.prisma && npx prisma generate && npm run build"
    startCommand: "cd backend && npx prisma db push --accept-data-loss && node dist/index.js"
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: delegate-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"

databases:
  - name: delegate-db
    plan: free
